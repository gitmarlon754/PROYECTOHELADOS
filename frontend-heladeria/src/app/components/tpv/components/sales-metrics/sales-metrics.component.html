<section class="border-bottom py-3 py-lg-4 animate-slide-in metrics-wrap">
  <div class="container-fluid px-3 px-lg-4 metrics-inner">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h2 class="h5 fw-bold mb-0">Metricas del Dia</h2>
      <button type="button" class="btn btn-light rounded-3" (click)="close.emit()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="row g-2 g-lg-3 mb-3 mb-lg-4">
      <div *ngFor="let metric of metrics; trackBy: trackByMetric" class="col-6 col-lg-3">
        <article class="metric-card border rounded-3 p-3 h-100">
          <div class="metric-icon rounded-3 d-inline-flex align-items-center justify-content-center mb-2" [ngClass]="metric.colorClass">
            <i [class]="metric.iconClass"></i>
          </div>
          <p class="fs-4 fw-bold mb-0">{{ metric.value }}</p>
          <p class="small text-muted mb-0">{{ metric.label }}</p>
        </article>
      </div>
    </div>

    <div class="row g-2 g-lg-3">
      <div class="col-6">
        <article class="pay-card border rounded-3 p-3 d-flex align-items-center gap-3 h-100">
          <div class="pay-icon card-pay d-flex align-items-center justify-content-center rounded-3">
            <i class="bi bi-credit-card"></i>
          </div>
          <div>
            <p class="fw-bold mb-0">{{ cardRevenue.toFixed(2) }}EUR</p>
            <p class="small text-muted mb-0">{{ cardSales.length }} pagos con tarjeta</p>
          </div>
        </article>
      </div>
      <div class="col-6">
        <article class="pay-card border rounded-3 p-3 d-flex align-items-center gap-3 h-100">
          <div class="pay-icon cash-pay d-flex align-items-center justify-content-center rounded-3">
            <i class="bi bi-cash-coin"></i>
          </div>
          <div>
            <p class="fw-bold mb-0">{{ cashRevenue.toFixed(2) }}EUR</p>
            <p class="small text-muted mb-0">{{ cashSales.length }} pagos en efectivo</p>
          </div>
        </article>
      </div>
    </div>

    <section *ngIf="sales.length > 0" class="mt-3 mt-lg-4">
      <h3 class="small fw-semibold mb-2">Ultimas Ventas</h3>
      <div class="d-flex flex-column gap-2 recent-list">
        <div
          *ngFor="let sale of recentSales; trackBy: trackBySale"
          class="d-flex align-items-center justify-content-between p-2 rounded-3 recent-item"
        >
          <div class="d-flex align-items-center gap-2">
            <span class="text-muted small">{{ formatSaleTime(sale) }}</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            <i [class]="sale.metodoPago === 'card' ? 'bi bi-credit-card text-muted' : 'bi bi-cash-coin text-muted'"></i>
            <span class="fw-semibold">{{ sale.total.toFixed(2) }}EUR</span>
          </div>
        </div>
      </div>
    </section>
  </div>
</section>
